name: CI

on:
  pull_request:
  push:
    branches: [ main, develop ]

env:
  BUNDLE_RUBYGEMS__PKG__GITHUB__COM: ${{ secrets.BUNDLE_RUBYGEMS__PKG__GITHUB__COM }}

jobs:
  scan_ruby:
    runs-on: arc-runner-set
    container:
      image: ruby:3.4.7

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure git for private gems
        run: git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "git@github.com:"

      - name: Cache bundle gems
        uses: actions/cache@v4
        with:
          path: /usr/local/bundle
          key: bundle-${{ runner.os }}-${{ hashFiles('Gemfile.lock') }}
          restore-keys: bundle-${{ runner.os }}-

      - name: Install dependencies
        run: bundle install --jobs 4

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

  scan_js:
    runs-on: arc-runner-set
    container:
      image: ruby:3.4.7

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure git for private gems
        run: git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "git@github.com:"

      - name: Cache bundle gems
        uses: actions/cache@v4
        with:
          path: /usr/local/bundle
          key: bundle-${{ runner.os }}-${{ hashFiles('Gemfile.lock') }}
          restore-keys: bundle-${{ runner.os }}-

      - name: Install dependencies
        run: bundle install --jobs 4

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  lint:
    runs-on: arc-runner-set
    container:
      image: ruby:3.4.7
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure git for private gems
        run: git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "git@github.com:"

      - name: Cache bundle gems
        uses: actions/cache@v4
        with:
          path: /usr/local/bundle
          key: bundle-${{ runner.os }}-${{ hashFiles('Gemfile.lock') }}
          restore-keys: bundle-${{ runner.os }}-

      - name: Install dependencies
        run: bundle install --jobs 4

      - name: Cache RuboCop results
        uses: actions/cache@v4
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: arc-runner-set
    container:
      image: ruby:3.4.7

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Install packages
        run: apt-get update -qq && apt-get install --no-install-recommends -y libpq-dev

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure git for private gems
        run: git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "git@github.com:"

      - name: Cache bundle gems
        uses: actions/cache@v4
        with:
          path: /usr/local/bundle
          key: bundle-pg-${{ runner.os }}-${{ hashFiles('Gemfile.lock') }}
          restore-keys: bundle-pg-${{ runner.os }}-

      - name: Install dependencies
        run: bundle install --jobs 4

      - name: Run tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@postgres:5432
        run: bin/rails db:test:prepare test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: brainz-lab/vision
          files: ./coverage/.resultset.json
          fail_ci_if_error: false
