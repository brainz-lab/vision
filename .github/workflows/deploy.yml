name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: registry.digitalocean.com
  IMAGE_NAME: ${{ secrets.DO_REGISTRY }}/vision

jobs:
  build:
    runs-on: arc-runner-set
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCTL_ACCESS_TOKEN }}
          password: ${{ secrets.DOCTL_ACCESS_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          secrets: |
            bundle_github=${{ secrets.BUNDLE_RUBYGEMS__PKG__GITHUB__COM }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build]
    runs-on: arc-runner-set
    timeout-minutes: 15
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DOCTL_ACCESS_TOKEN }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Deploy to clusters
        env:
          CLUSTER_IDS: ${{ secrets.DOKS_CLUSTER_IDS }}
          CLUSTER_ID: ${{ secrets.DOKS_CLUSTER_ID }}
        run: |
          if [ -n "$CLUSTER_IDS" ]; then
            CLUSTERS=$(echo "$CLUSTER_IDS" | tr -d '[]" ' | tr ',' '\n')
          else
            CLUSTERS="$CLUSTER_ID"
          fi

          for CLUSTER in $CLUSTERS; do
            echo "::group::Deploying to cluster $CLUSTER"
            doctl kubernetes cluster kubeconfig save "$CLUSTER"
            kubectl rollout restart deployment/vision-web -n default
            kubectl rollout restart deployment/vision-job -n default
            kubectl rollout status deployment/vision-web -n default --timeout=5m
            echo "::endgroup::"
          done

  notify:
    needs: [deploy]
    runs-on: arc-runner-set
    if: always()
    steps:
      - name: Notify Slack - Deploy Success
        if: needs.deploy.result == 'success'
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_DEPLOY_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ *Vision* deployed successfully to production",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "✅ Vision — Deploy Succeeded"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Service:*\nvision (web + job)" },
                    { "type": "mrkdwn", "text": "*Environment:*\nproduction (DOKS)" },
                    { "type": "mrkdwn", "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`>" },
                    { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" }
                  ]
                },
                {
                  "type": "context",
                  "elements": [
                    { "type": "mrkdwn", "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>" }
                  ]
                }
              ]
            }

      - name: Notify Slack - Deploy Failed
        if: needs.deploy.result == 'failure'
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_DEPLOY_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚨 *Vision* deploy FAILED",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚨 Vision — Deploy Failed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Service:*\nvision" },
                    { "type": "mrkdwn", "text": "*Environment:*\nproduction (DOKS)" },
                    { "type": "mrkdwn", "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`>" },
                    { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" }
                  ]
                },
                {
                  "type": "context",
                  "elements": [
                    { "type": "mrkdwn", "text": "⚠️ <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Investigate in workflow run>" }
                  ]
                }
              ]
            }
